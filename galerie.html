<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie</title>

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#0f0f0f;
    color:white;
}

.page-title{
    text-align:center;
    padding:40px;
    color:#D4AF37;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    width:90%;
    margin:auto;
    padding-bottom:60px;
}

.card{
    background:#1a1a1a;
    border:1px solid #D4AF37;
    border-radius:15px;
    overflow:hidden;
    transition:0.4s;
    text-align:center;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    color:#D4AF37;
}

</style>

</head>

<body>

<section class="page-title">
  <h2>Notre Galerie</h2>
</section>

<section class="gallery-grid">

  <div class="card">
    <img src="image/avant-apres-maison.jpg">
    <h3>Maison</h3>
  </div>

  <div class="card">
    <img src="image/avant-apres-bureau.jpg">
    <h3>Bureau</h3>
  </div>

  <div class="card">
    <img src="image/avant-apres-vitres.jpg">
    <h3>Vitres</h3>
  </div>

  <div class="card">
    <img src="image/avant-apres-desinfection.jpg">
    <h3>Désinfection</h3>
  </div>

</section>

<script>
console.log("Galerie chargée");
</script>

</body>
</html>
